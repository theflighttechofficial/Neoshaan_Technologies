<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<link rel="preconnect" href="https://fonts.googleapis.com" />
      
    <title>Document</title>
    <style>
        
.header {
  background: #003f72; padding: 15px 30px; display: flex; align-items: center;
}
.header .logo { height: 60px; }
.header nav a { margin-left: 20px; color: #fff; font-weight: 500; }
.header nav .active, .header nav a:hover { text-decoration: underline; }

.contact {
  padding: 50px 20px; background: #fff;
}
.inner-wrapper {
  display: flex; gap: 40px; max-width: 1100px; margin: auto;
}
.left, .right {
  flex: 1; min-width: 300px;
}
.contact-form input, 
.contact-form textarea {
  width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;
  font-size: 1.05rem;
}
.contact-form button {
  padding: 12px 25px; background: #00539c; color: #fff; border: none; border-radius: 4px;
  font-size: 1.1rem; cursor: pointer;
}
.contact-form button:hover { background: #003f72; }

.map iframe {
  width: 100%; height: 380px; border: 0;
}
.footer {
  background: #003f72; color: #fff; padding: 20px 0; text-align: center;
}
.footer-inner a {
  color: #fff; margin: 0 15px; text-decoration: none; font-size: 0.95rem;
}
.footer-inner p { margin-top: 15px; font-size: 0.9rem; }


    </style>
</head>
<body>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="anonymous" />
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Saira:wght@500;600;700&display=swap"
        rel="stylesheet"
      />
      <link
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"
        rel="stylesheet"
      />
      <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
        rel="stylesheet"
      />, initial-scale=1.0">
</body>
</html>
