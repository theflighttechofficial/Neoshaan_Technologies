<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Event Registration</title>
<style>
  body{font-family:sans-serif;background:#f6f7fb;padding:20px}
  form{max-width:450px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 4px 12px #0002}
  label{display:block;margin:10px 0 6px}
  input{width:100%;padding:10px;border:1px solid #ccc;border-radius:6px}
  input:focus{border-color:#6b7cff;box-shadow:0 0 0 2px #6b7cff44;outline:0}
  button{margin-top:12px;padding:10px 14px;border:0;border-radius:6px;cursor:pointer}
  button[type=submit]{background:#111;color:#fff}
  button[type=reset]{background:#ddd}
</style>
</head>
<body>
<form>
  <!-- Full Name -->
  <label>Full Name*  
    <input type="text" name="name" required 
           pattern="^[A-Za-z]+(?:[ '\-][A-Za-z]+)*$" 
           title="Only alphabets, spaces, hyphen or apostrophe allowed" 
           minlength="2" maxlength="50">
  </label>

  <!-- Email -->
  <label>Email*  
    <input type="email" name="email" required 
           title="Enter a valid email address" 
           maxlength="100">
  </label>

  <!-- Phone -->
  <label>Phone*  
    <input type="tel" name="phone" required 
           pattern="^(?:\+?91[- ]?)?[6-9]\d{9}$" 
           title="Enter a valid 10-digit Indian number (with optional +91)" 
           minlength="10" maxlength="13">
  </label>

  <!-- Event -->
  <label>Event*  
    <input type="text" name="event" required 
           minlength="3" maxlength="40" 
           title="Event name must be at least 3 characters">
  </label>

  <!-- Organization -->
  <label>Organization  
    <input type="text" name="org" 
           maxlength="60" 
           title="Organization name (optional)">
  </label>

  <!-- Age -->
  <label>Age*  
    <input type="number" name="age" required 
           min="10" max="100" 
           title="Enter age between 10 and 100">
  </label>

  <!-- Password -->
  <label>Password*  
    <input type="password" name="password" required 
           minlength="6" maxlength="20" 
           pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$" 
           title="Password must be 6–20 chars with letters and numbers">
  </label>

  <!-- Date of Event -->
  <label>Date of Event*  
    <input type="date" name="eventDate" required 
           min="2025-01-01" max="2026-12-31" 
           title="Select a valid event date">
  </label>

  <button type="submit">Register</button>
  <button type="reset">Clear</button>
</form>
</body>
</html>
